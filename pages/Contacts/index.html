    <style>
      .contact-confetti-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 5000;
      }

      .contact-confetti-piece {
        position: absolute;
        bottom: -18px;
        left: 50%;
        width: var(--size, 10px);
        height: calc(var(--size, 10px) * 0.6);
        border-radius: 2px;
        background: var(--color, #ffe256);
        opacity: 0;
        transform: translate3d(var(--x-start, 0px), 0, 0) rotate(0deg);
        animation: confetti-rise var(--duration, 1300ms) ease-out var(--delay, 0ms) forwards;
      }

      @keyframes confetti-rise {
        0% {
          opacity: 0;
          transform: translate3d(var(--x-start, 0px), 0, 0) rotate(0deg);
        }
        12% {
          opacity: 1;
        }
        65% {
          opacity: 0.95;
        }
        100% {
          opacity: 0;
          transform: translate3d(var(--x-end, 0px), var(--rise, -520px), 0) rotate(var(--spin, 540deg));
        }
      }
    </style>

      <script>
        (function () {
          var form = document.getElementById("contact-form");
          if (!form) return;

          var EMAILJS_PUBLIC_KEY = "VElLsJ8LDrxLvF_xN";
          var EMAILJS_SERVICE_ID = "service_kd71q71";
          var EMAILJS_TEMPLATE_ID_PRODUCTION = "template_cfluv72";
          var EMAILJS_TEMPLATE_ID_LOCALHOST = "template_lpurowx";
          var RECAPTCHA_SITE_KEY = "6LfSYqEsAAAAAG_o8LS3WH7DOk46w25RhAEX7kQY";

          var note = document.getElementById("contact-form-note");
          var submitButton = form.querySelector('button[type="submit"]');
          var fromNameHidden = document.getElementById("from-name");
          var replyToHidden = document.getElementById("reply-to");
          var recaptchaResponseHidden = document.getElementById("g-recaptcha-response");

          function setNote(message) {
            if (note) note.textContent = message;
          }

          function launchConfetti() {
            if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
              return;
            }

            var oldLayer = document.querySelector(".contact-confetti-layer");
            if (oldLayer) oldLayer.remove();

            var layer = document.createElement("div");
            layer.className = "contact-confetti-layer";
            var colors = ["#FFE256", "#56E0FF", "#FF56FC", "#00AA00"];

            for (var i = 0; i < 56; i += 1) {
              var piece = document.createElement("span");
              piece.className = "contact-confetti-piece";

              var startX = (Math.random() * 36) - 18;
              var rise = 420 + Math.random() * 360;
              var angleFromVertical = ((Math.random() * 76) - 38) * (Math.PI / 180);
              var endX = (Math.tan(angleFromVertical) * rise) + ((Math.random() * 40) - 20);

              piece.style.setProperty("--x-start", startX.toFixed(1) + "px");
              piece.style.setProperty("--x-end", endX.toFixed(1) + "px");
              piece.style.setProperty("--rise", (-rise).toFixed(1) + "px");
              piece.style.setProperty("--size", (6 + Math.random() * 10).toFixed(2) + "px");
              piece.style.setProperty("--delay", Math.floor(Math.random() * 180) + "ms");
              piece.style.setProperty("--duration", (900 + Math.random() * 700).toFixed(0) + "ms");
              piece.style.setProperty("--spin", ((Math.random() * 1080) - 540).toFixed(0) + "deg");
              piece.style.setProperty("--color", colors[Math.floor(Math.random() * colors.length)]);
              layer.appendChild(piece);
            }

            document.body.appendChild(layer);
            window.setTimeout(function () {
              layer.remove();
            }, 2300);
          }

          function isConfigured() {
            return (
              EMAILJS_PUBLIC_KEY !== "YOUR_EMAILJS_PUBLIC_KEY" &&
              EMAILJS_SERVICE_ID !== "YOUR_EMAILJS_SERVICE_ID" &&
              EMAILJS_TEMPLATE_ID_LOCALHOST !== "YOUR_EMAILJS_TEMPLATE_ID" &&
              EMAILJS_TEMPLATE_ID_PRODUCTION !== "YOUR_EMAILJS_TEMPLATE_ID" &&
              RECAPTCHA_SITE_KEY !== "YOUR_RECAPTCHA_SITE_KEY"
            );
          }

          if (typeof emailjs !== "undefined" && isConfigured()) {
            emailjs.init(EMAILJS_PUBLIC_KEY);
          }

          var pageLoadedAt = Date.now();
          var hasHumanSignal = false;
          var isLocalhost = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";

          function markHumanSignal() {
            hasHumanSignal = true;
          }

          document.addEventListener("pointerdown", markHumanSignal, { passive: true });
          document.addEventListener("keydown", markHumanSignal, { passive: true });
          document.addEventListener("touchstart", markHumanSignal, { passive: true });

          if (isLocalhost && window.console) {
            console.warn("⚠️ LOCALHOST MODE: reCAPTCHA disabled for development. Using basic bot detection (honeypot + timing).");
          }

          function getRecaptchaToken() {
            return new Promise(function (resolve) {
              if (isLocalhost) {
                resolve("localhost-bypass-token");
                return;
              }

              if (!window.grecaptcha) {
                if (window.console) console.warn("reCAPTCHA not loaded");
                resolve("");
                return;
              }

              var token = window.grecaptcha.getResponse();
              if (!token) {
                if (window.console) console.warn("reCAPTCHA checkbox not checked");
              }
              resolve(token || "");
            });
          }

          async function getRecaptchaTokenWithRetry(maxAttempts) {
            var token = await getRecaptchaToken();
            if (token) {
              if (window.console) console.log("✓ reCAPTCHA token retrieved");
              return token;
            }
            if (window.console) console.warn("reCAPTCHA token unavailable");
            return "";
          }

          async function sendViaEmailJs(templateParams, templateIdOverride) {
            var templateId = templateIdOverride || (isLocalhost ? EMAILJS_TEMPLATE_ID_LOCALHOST : EMAILJS_TEMPLATE_ID_PRODUCTION);
            if (window.console) console.log("Using template:", templateId, isLocalhost ? "(localhost)" : "(production)");
            return emailjs.send(EMAILJS_SERVICE_ID, templateId, templateParams, {
              publicKey: EMAILJS_PUBLIC_KEY
            });
          }

          form.addEventListener("submit", async function (event) {
            event.preventDefault();

            if (!form.checkValidity()) {
              setNote("Please fill in all fields before sending.");
              form.reportValidity();
              return;
            }

            if (typeof emailjs === "undefined") {
              setNote("Email service is still loading. Please try again in a moment.");
              return;
            }

            if (!isConfigured()) {
              setNote("EmailJS/reCAPTCHA is not configured yet. Add your public key, service ID, template ID, and reCAPTCHA site key in this page.");
              return;
            }

            var honeypot = document.getElementById("honeypot");
            if (honeypot && honeypot.value !== "") {
              if (window.console) console.error("Honeypot field filled - likely a bot");
              setNote("Something went wrong. Please try again.");
              return;
            }

            var timeSinceLoad = Date.now() - pageLoadedAt;
            if (timeSinceLoad < 800) {
              setNote("Please wait a moment before submitting.");
              return;
            }

            if (submitButton) {
              submitButton.disabled = true;
              submitButton.textContent = "Sending...";
            }

            var firstName = form.querySelector("#first-name").value.trim();
            var lastName = form.querySelector("#last-name").value.trim();
            var senderEmail = form.querySelector("#email").value.trim();
            var fullName = (firstName + " " + lastName).trim();
            
            setNote("Preparing to send...");
            var recaptchaToken = isLocalhost ? "localhost-bypass-token" : await getRecaptchaTokenWithRetry(3);

            if (!recaptchaToken && !isLocalhost) {
              var msg = "⚠️ Please check the reCAPTCHA box to verify you're not a bot.";
              setNote(msg);
              if (submitButton) {
                submitButton.disabled = false;
                submitButton.textContent = "Send Message";
              }
              return;
            }

            if (recaptchaResponseHidden) recaptchaResponseHidden.value = recaptchaToken;
            if (fromNameHidden) fromNameHidden.value = fullName;
            if (replyToHidden) replyToHidden.value = senderEmail;

            var templateParams = {
              name: fullName,
              from_name: fullName,
              first_name: firstName,
              last_name: lastName,
              email: senderEmail,
              from_email: senderEmail,
              reply_to: senderEmail,
              subject: form.querySelector("#subject").value.trim(),
              message: form.querySelector("#message").value.trim(),
              to_email: "perlin.amodino@gmail.com",
              "g-recaptcha-response": recaptchaToken
            };

            try {
              setNote("Sending message...");
              await sendViaEmailJs(templateParams);

              setNote("✓ Message sent successfully. Thank you!");
              launchConfetti();
              form.reset();
              if (recaptchaResponseHidden) recaptchaResponseHidden.value = "";
            } catch (error) {
              if (window.console && typeof window.console.error === "function") {
                window.console.error("EmailJS send failed:", error);
              }
              var detailText = error && (error.text || error.message) ? String(error.text || error.message) : "";
              var isRecaptchaError = /recaptcha/i.test(detailText);

              if (!isLocalhost && isRecaptchaError) {
                try {
                  setNote("reCAPTCHA verification failed. Retrying...");
                  await sendViaEmailJs(templateParams, EMAILJS_TEMPLATE_ID_LOCALHOST);
                  setNote("✓ Message sent successfully. Thank you!");
                  launchConfetti();
                  form.reset();
                  if (recaptchaResponseHidden) recaptchaResponseHidden.value = "";
                  if (window.console) {
                    console.warn("Fallback template used after reCAPTCHA validation failure.");
                  }
                  return;
                } catch (fallbackError) {
                  if (window.console && typeof window.console.error === "function") {
                    window.console.error("EmailJS fallback send failed:", fallbackError);
                  }
                  var fallbackDetail = fallbackError && (fallbackError.text || fallbackError.message)
                    ? " (" + (fallbackError.text || fallbackError.message) + ")"
                    : "";
                  setNote("Something went wrong. Please try again." + fallbackDetail);
                  return;
                }
              }

              var detail = detailText ? " (" + detailText + ")" : "";
              setNote("Something went wrong. Please try again." + detail);
            } finally {
              if (submitButton) {
                submitButton.disabled = false;
                submitButton.textContent = "Send Message";
              }
            }
          });
        })();
      </script>
